<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- 背景和渐变定义 -->
  <defs>
    <!-- 文字背景渐变 -->
    <linearGradient id="textBgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <!-- 阴影效果 -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feOffset in="blur" dx="2" dy="2" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="offsetBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- 文字阴影 -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur" />
      <feOffset in="blur" dx="1" dy="1" result="offsetBlur" />
      <feMerge>
        <feMergeNode in="offsetBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 圆形分隔盘 -->
  <g filter="url(#dropShadow)">
    <!-- 圆形外框 -->
    <circle cx="64" cy="64" r="58" fill="rgba(255, 255, 255, 0.8)" stroke="#e5e7eb" stroke-width="1" />
    <!-- 分隔线 -->
    <line x1="64" y1="6" x2="64" y2="122" stroke="#e5e7eb" stroke-width="1" />
    <line x1="6" y1="64" x2="122" y2="64" stroke="#e5e7eb" stroke-width="1" />
  </g>
  
  <!-- 中药材 -->
  <g>
    <!-- 左上象限 - 浅色切片 -->
    <g>
      <ellipse cx="35" cy="35" rx="8" ry="4" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
      <ellipse cx="45" cy="25" rx="6" ry="3" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
      <ellipse cx="25" cy="45" rx="6" ry="3" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
    </g>
    
    <!-- 右上象限 - 深色根茎 -->
    <g>
      <ellipse cx="85" cy="35" rx="8" ry="3" fill="#92400e" stroke="#78350f" stroke-width="0.5" />
      <ellipse cx="75" cy="25" rx="6" ry="2" fill="#92400e" stroke="#78350f" stroke-width="0.5" />
      <ellipse cx="95" cy="45" rx="6" ry="2" fill="#92400e" stroke="#78350f" stroke-width="0.5" />
    </g>
    
    <!-- 左下象限 - 浅黄色切片和条状 -->
    <g>
      <ellipse cx="35" cy="95" rx="6" ry="3" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
      <ellipse cx="25" cy="85" rx="4" ry="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
      <ellipse cx="45" cy="85" rx="4" ry="2" fill="#fef3c7" stroke="#d97706" stroke-width="0.5" />
    </g>
    
    <!-- 右下象限 - 枸杞 -->
    <g>
      <circle cx="85" cy="95" r="3" fill="#ef4444" />
      <circle cx="95" cy="85" r="3" fill="#ef4444" />
      <circle cx="75" cy="85" r="3" fill="#ef4444" />
      <circle cx="90" cy="90" r="3" fill="#ef4444" />
    </g>
  </g>
  
  <!-- 文字区域 -->
  <g filter="url(#textShadow)">
    <!-- 文字背景 -->
    <rect x="20" y="40" width="88" height="48" rx="8" fill="url(#textBgGradient)" />
    <!-- 文字 -->
    <text x="64" y="62" font-family="'SimHei', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">中药诊疗</text>
    <text x="64" y="82" font-family="'SimHei', sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#ffffff">管理助手</text>
  </g>
</svg>
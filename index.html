<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目导航页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 50px;
      color: white;
    }
    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    .header p {
      font-size: 1.1rem;
      opacity: 0.9;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
      padding: 0 20px;
    }
    .project-card {
      padding: 40px 30px;
      background: white;
      border-radius: 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: #333;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }
    .project-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .project-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .project-card:hover::before {
      transform: scaleX(1);
    }
    .project-card .icon {
      font-size: 3rem;
      margin-bottom: 20px;
    }
    .project-card h3 {
      margin: 0 0 15px;
      font-size: 1.4rem;
      color: #333;
    }
    .project-card p {
      margin: 0;
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
    }
    .project-card .tag {
      display: inline-block;
      margin-top: 15px;
      padding: 5px 12px;
      background: #f0f2f5;
      border-radius: 20px;
      font-size: 0.8rem;
      color: #666;
    }
    .footer {
      text-align: center;
      margin-top: 60px;
      color: white;
      opacity: 0.8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>项目导航中心</h1>
    <p>选择一个项目开始浏览</p>
  </div>
  
  <div class="container">
    <!-- CMMS 项目入口 -->
    <a class="project-card" href="./cmms/index.html">
      <div class="icon">🏥</div>
      <h3>中药诊疗管理助手</h3>
      <p>基于 Vue3 + Ant Design 的中药诊疗管理系统，提供智能化的诊疗辅助功能</p>
      <span class="tag">Vue3</span>
    </a> 
  </div>
  
  <div class="footer">
    <p>Powered by IPagePortal</p>
  </div>
</body>
</html>
